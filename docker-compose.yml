# Local development database only — not for production.
# Credentials are defaults; override via .env if needed.

services:
  db:
    image: postgres:16-alpine
    container_name: user-import-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_import
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
